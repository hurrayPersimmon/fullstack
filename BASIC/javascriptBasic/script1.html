<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>JavaScript 출력</h2>
    <script>
      console.log('야호');

      document.writeln('케케<br>');

      alert('js 공부하기 유후~');

      const sum = 100 + 200;
      /* writeln시에 띄어쓰기가 된다.*/
      document.writeln(`100 + 200 = ${sum}`);

      document.writeln(`${sum}<br>`);

      const isGreater = 100 > 200;
      document.writeln(`100 > 200 : ${isGreater}<br>`);
    </script>
  </body>
</html>
