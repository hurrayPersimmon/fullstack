<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시도, 구군, 동 선택</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      h1 {
        text-align: center;
        color: #333;
      }

      .form-group {
        margin: 20px 0;
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-weight: bold;
      }

      select {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1em;
      }

      .result {
        margin-top: 20px;
        padding: 10px;
        background-color: #f1f1f1;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>시도, 구군, 동 선택</h1>

    <div class="form-group">
      <label for="sido">시도 선택</label>
      <select id="sido" onchange="updateGuGun()">
        <option value="">시도를 선택하세요</option>
        <option value="서울">서울특별시</option>
        <option value="경기">경기도</option>
        <option value="부산">부산광역시</option>
      </select>
    </div>

    <div class="form-group">
      <label for="gugun">구군 선택</label>
      <select id="gugun" onchange="updateDong()">
        <option value="">구군을 선택하세요</option>
      </select>
    </div>

    <div class="form-group">
      <label for="dong">동 선택</label>
      <select id="dong" onchange="showResult()">
        <option value="">동을 선택하세요</option>
      </select>
    </div>

    <div class="result" id="result">선택된 정보가 여기에 표시됩니다.</div>

    <script>
      // 데이터: 시도 -> 구군 -> 동
      const data = {
        서울: {
          강남구: ['삼성동', '청담동', '역삼동'],
          종로구: ['가회동', '삼청동', '익선동'],
        },
        경기: {
          수원시: ['영통동', '인계동', '매탄동'],
          성남시: ['분당동', '정자동', '서현동'],
        },
        부산: {
          해운대구: ['우동', '중동', '좌동'],
          부산진구: ['범천동', '부전동', '초읍동'],
        },
      };

      const sidoSelect = document.getElementById('sido');
      const gugunSelect = document.getElementById('gugun');
      const dongSelect = document.getElementById('dong');
      const resultDiv = document.getElementById('result');

      // 구군 업데이트
      function updateGuGun() {
        const selectedSido = sidoSelect.value;
        gugunSelect.innerHTML = '<option value="">구군을 선택하세요</option>';
        dongSelect.innerHTML = '<option value="">동을 선택하세요</option>';

        // selectedSido는 if문에서는 선택되었을때 true로 된다.
        if (selectedSido) {
          const guguns = Object.keys(data[selectedSido]);
          guguns.forEach((gugun) => {
            const option = document.createElement('option');
            option.value = gugun;
            option.textContent = gugun;
            gugunSelect.appendChild(option);
          });
        }
        resultDiv.textContent = '선택된 정보가 여기에 표시됩니다.';
      }

      // 동 업데이트
      function updateDong() {
        const selectedSido = sidoSelect.value;
        const selectedGuGun = gugunSelect.value;
        dongSelect.innerHTML = '<option value="">동을 선택하세요</option>';

        if (selectedSido && selectedGuGun) {
          const dongs = data[selectedSido][selectedGuGun];
          dongs.forEach((dong) => {
            const option = document.createElement('option');
            option.value = dong;
            option.textContent = dong;
            dongSelect.appendChild(option);
          });
        }
        resultDiv.textContent = '선택된 정보가 여기에 표시됩니다.';
      }

      // 결과 표시
      function showResult() {
        const selectedSido = sidoSelect.value;
        const selectedGuGun = gugunSelect.value;
        const selectedDong = dongSelect.value;

        if (selectedSido && selectedGuGun && selectedDong) {
          resultDiv.textContent = `선택된 지역: ${selectedSido} > ${selectedGuGun} > ${selectedDong}`;
        }
      }
    </script>
  </body>
</html>
