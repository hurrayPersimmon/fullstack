<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>영화 예매 목록</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f4f4f4;
      }

      h1 {
        text-align: center;
        color: #4caf50;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      button {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        background-color: #4caf50;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      button:hover {
        background-color: #45a049;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background-color: white;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
      }

      th {
        background-color: #4caf50;
        color: white;
      }

      tr:nth-child(even) {
        background-color: #f2f2f2;
      }
    </style>
  </head>

  <body>
    <h1>영화 예매 목록</h1>
    <button id="loadMovies">예매 목록 불러오기</button>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>영화 제목</th>
          <th>정보</th>
        </tr>
      </thead>
      <tbody id="movieTable">
        <!-- 영화 목록이 여기에 표시됩니다 -->
      </tbody>
    </table>

    <script>
      // 데이터를 가져와 테이블에 표시하는 함수
      async function fetchMovieList() {
        try {
          // JSON 데이터를 가져옴
          const response = await fetch(
            'https://jsonplaceholder.typicode.com/posts',
          );

          if (!response.ok) {
            throw new Error(`HTTP 오류 발생: ${response.status}`);
          }

          // 데이터를 JSON으로 변환
          const movies = await response.json();
          console.log(movies);

          // 가져온 데이터 중 일부만 표시 (10개 제한)
          displayMovies(movies.slice(0, 10));
        } catch (error) {
          console.error('데이터를 불러오는 중 오류 발생:', error);
          alert('영화 예매 데이터를 불러오는 데 실패했습니다.');
        }
      }

      // 데이터를 테이블에 표시하는 함수
      function displayMovies(movies) {
        const tableBody = document.getElementById('movieTable');
        tableBody.innerHTML = ''; // 기존 내용 비우기

        movies.forEach((movie) => {
          const row = `
                    <tr>
                        <td>${movie.id}</td>
                        <td>${movie.title}</td>
                        <td>${movie.body}</td>
                    </tr>
                `;
          tableBody.innerHTML += row;
        });
      }

      // 버튼 클릭 이벤트 처리
      document
        .getElementById('loadMovies')
        .addEventListener('click', fetchMovieList);
    </script>
  </body>
</html>
