<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML 테이블 예시</title>
    <style>
      h2 {
        text-align: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid black;
        padding: 8px;
        text-align: center;
      }
      th {
        background-color: #2c92c5;
        color: aliceblue;
        border: 3px solid black;
      }
    </style>
  </head>
  <body>
    <h2>한국의 위인</h2>

    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>나이</th>
          <th>직업</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>홍길동</td>
          <td colspan="2">실존하지 않는 인물</td>
        </tr>
        <tr>
          <td>이순신</td>
          <td>45</td>
          <td>장군</td>
        </tr>
        <tr>
          <td>뿡뿡이</td>
          <td>12</td>
          <td>연예인</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3">총 3명</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
