<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>목록 조합 예제</title>
  </head>
  <body>
    <h2>내가 좋아하는 것들</h2>

    <!-- 순서 없는 목록 -->
    <h3>취미</h3>
    <ul>
      <li>독서</li>
      <li>여행</li>
      <li>사진 찍기</li>
    </ul>

    <!-- 순서 있는 목록 -->
    <h3>하루 일과</h3>
    <ol>
      <li>기상</li>
      <li>운동</li>
      <li>업무</li>
      <li>휴식</li>
      <li>취침</li>
    </ol>

    <!-- 설명 목록 -->
    <h3>프로그래밍 언어</h3>
    <dl>
      <!--Description Term-->
      <dt>Python</dt>
      <!--Description Details-->
      <dd>간결하고 사용하기 쉬운 프로그래밍 언어.</dd>

      <dt>Java</dt>
      <dd>엔터프라이즈 애플리케이션에서 많이 사용되는 객체 지향 언어.</dd>

      <dt>JavaScript</dt>
      <dd>웹 상호작용 기능을 구현하는 대표적인 언어.</dd>
    </dl>
  </body>
</html>
