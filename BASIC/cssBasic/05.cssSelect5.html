<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CSS Selector : Adjacent sibling Selector(인접선택자)</title>
    <style>
      div,
      p {
        padding: 10px;
        margin: 10px;
        font-weight: bold;
      }

      div {
        background: #0076ff;
      }

      div + p {
        background: yellow;
        color: #0076ff;
      }

      p + p {
        background: green;
        color: #0076ff;
      }

      p + p + p {
        background: white;
        color: red;
      }

      div + p + p + p + p {
        background: black;
        color: white;
      }
    </style>
  </head>
  <body>
    <div>dummy</div>
    <p>Adjacent sibling Selector(인접선택자)</p>
    <p>Adjacent sibling Selector(인접선택자)</p>
    <div>dummy</div>
    <p>Adjacent sibling Selector(인접선택자)</p>
    <p>Adjacent sibling Selector(인접선택자)</p>
    <p>Adjacent sibling Selector(인접선택자)</p>
    <p>Adjacent sibling Selector(인접선택자)</p>
  </body>
</html>
