<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        /* display:flex는 row가 기본으로 꼬지처럼 묶어용*/
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .item {
        flex: 0 1 calc(33.333% - 10px);
        background-color: #74b9ff;
        color: white;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }

      @media (max-width: 768px) {
        .item {
          flex: 0 1 calc(50% - 10px);
        }
      }

      @media (max-width: 600px) {
        .item {
          flex: 0 1 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">Item 1</div>
      <div class="item">Item 2</div>
      <div class="item">Item 3</div>
      <div class="item">Item 4</div>
      <div class="item">Item 5</div>
      <div class="item">Item 6</div>
    </div>

    <div
      id="size-display"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        z-index: 9999;
        font-family: sans-serif;
        font-size: 14px;
      "
    >
      Width: <span id="width">0</span>px | Height: <span id="height">0</span>px
    </div>

    <script>
      function updateSize() {
        document.getElementById('width').innerText = window.innerWidth;
        document.getElementById('height').innerText = window.innerHeight;
      }

      window.addEventListener('resize', updateSize);
      window.addEventListener('load', updateSize);
      updateSize();
    </script>
  </body>
</html>
