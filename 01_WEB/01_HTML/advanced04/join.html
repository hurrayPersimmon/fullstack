<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="username">사용자 ID</label></td>
            <td><input id="username" type="text" /></td>
          </tr>
          <tr>
            <td><label for="password">비밀번호</label></td>
            <td><input id="password" type="password" /></td>
          </tr>
          <tr>
            <td><label for="pwcheck">비밀번호 확인</label></td>
            <td><input id="pwcheck" type="password" /></td>
          </tr>
          <tr>
            <td><label for="name">이름</label></td>
            <td><input id="name" type="text" /></td>
          </tr>
          <tr>
            <td><label for="gender">성별</label></td>
            <td>
              <input type="radio" name="gender" value="male" /><label for="male"
                >남</label
              >
              <input type="radio" name="gender" value="female" /><label
                for="male"
                >여</label
              >
            </td>
          </tr>
          <tr>
            <td><label for="sports">성별</label></td>
            <td>
              <input type="checkbox" name="sports" value="soccer" /><label
                for="soccer"
                >축구</label
              >
              <input type="checkbox" name="sports" value="baseball" /><label
                for="baseball"
                >야구</label
              >
              <input type="checkbox" name="sports" value="volleyball" /><label
                for="volleyball"
                >배구</label
              >
              <input type="checkbox" name="sports" value="basketball" /><label
                for="basketball"
                >농구</label
              >
            </td>
          </tr>
          <tr>
            <td><label for="mail">email</label></td>
            <td><input id="mail" type="mail" /></td>
          </tr>
          <tr>
            <td><label for="role">역할</label></td>
            <td>
              <select>
                <option value="superAdmin">ADMIN</option>
                <option value="administrator">관리자</option>
                <option value="member">일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="submit" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
