<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        font-weight: bold;
      }
      /* ul 하위의 ol은 css가 상속되므로 따로 한번 더 적용. */
      ol {
        font-weight: normal;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>
        과일
        <ol>
          <li>사과</li>
          <li>바나나</li>
          <li>오렌지</li>
        </ol>
      </li>
    </ul>
    <ul>
      <li>
        채소
        <ol>
          <li>상추</li>
          <li>치커리</li>
          <li>양배추</li>
        </ol>
      </li>
    </ul>
  </body>
</html>
