<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let nowDate = new Date();
      let nowHour = nowDate.getHours();
      if (nowHour < 5) alert('잠을 자렴');
      else if (nowHour < 7) alert('준비');
      else if (nowHour < 9) alert('출근');
      else if (nowHour < 12) alert('빈둥빈둥');
      else if (nowHour < 14) alert('식사');
      else alert('여러가지 업무를 수행합니다.');
    </script>
  </body>
</html>
