<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traditional Event - Default Event</title>
    <script>
      window.onload = () => {
        let button = document.getElementById('button');
        button.onclick = () => {
          return false;
        };
      };
    </script>
  </head>
  <body>
    <a id="button" href="https://www.naver.com">Naver 바로가기</a>
  </body>
</html>
