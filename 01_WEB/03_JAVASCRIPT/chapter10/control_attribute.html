<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = () => {
        let image = document.getElementById('image');
      };

      window.onclick = () => {
        image.src = '../../htmlBasic/images/요시.jpeg';
        image.width = 300;
        image.height = 300;
      };
    </script>
  </head>
  <body>
    <img id="image" />
  </body>
</html>
