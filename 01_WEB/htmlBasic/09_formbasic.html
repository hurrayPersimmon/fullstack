<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML 폼 예시</title>
  </head>
  <body>
    <h2>회원가입 폼</h2>

    <form action="/submit_form" method="POST">
      <label for="name">이름:</label>
      <input type="text" id="name" name="name" required /><br /><br />

      <label for="email">이메일:</label>
      <input type="email" id="email" name="email" required /><br /><br />

      <label for="password">비밀번호:</label>
      <input
        type="password"
        id="password"
        name="password"
        required
      /><br /><br />

      <label>성별:</label>
      <input type="radio" id="male" name="gender" value="male" />
      <label for="male">남성</label>
      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">여성</label><br /><br />

      <label for="city">도시:</label>
      <select id="city" name="city">
        <option value="seoul">서울</option>
        <option value="busan">부산</option>
        <option value="incheon">인천</option></select
      ><br /><br />

      <label>취미:</label>
      <input type="checkbox" name="hobby" value="sports" /> 스포츠
      <input type="checkbox" name="hobby" value="music" /> 음악
      <input type="checkbox" name="hobby" value="reading" /> 독서<br /><br />

      <label for="message">자기소개:</label><br />
      <textarea id="message" name="message" rows="4" cols="50"></textarea
      ><br /><br />

      <input type="submit" value="제출" />
      <input type="reset" value="초기화" />
    </form>
  </body>
</html>
