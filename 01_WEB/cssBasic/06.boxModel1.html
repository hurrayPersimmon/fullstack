<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      ul {
        background-color: lightcoral;
        margin: 10%;
        border-style: dotted;
        border-width: medium;
        border-color: black;
        padding: 30px;
      }

      li {
        color: white;
        background-color: gray;
        border-style: solid;
        border-color: plum;
        border-width: 20px;
        list-style: none;
        margin: 12px;
        padding: 12px;
      }

      li:nth-child(2n) {
        color: gray;
        border-style: dashed;
      }
    </style>
  </head>
  <body>
    <!-- 비정렬 목록 생성 -->
    <ul>
      <!-- 첫 번째 리스트 항목 -->
      <li>첫번째 리스트입니다.</li>
      <!-- 두 번째 리스트 항목, .withborder 클래스가 적용 -->
      <li class="withborder">두번째 리스트입니다.</li>
      <li>세번째 리스트입니다.</li>
      <li>네번째 리스트입니다.</li>
    </ul>
  </body>
</html>
